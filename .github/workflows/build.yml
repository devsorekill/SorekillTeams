name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Spigot/Paper 1.21.x baseline
            java: "21"
            api-group: org.spigotmc
            api-artifact: spigot-api
            api-version: "1.21-R0.1-SNAPSHOT"
          - name: Spigot 26.1.2
            java: "25"
            api-group: org.spigotmc
            api-artifact: spigot-api
            api-version: "26.1.2-R0.1-SNAPSHOT"
          - name: Spigot 26.2
            java: "25"
            api-group: org.spigotmc
            api-artifact: spigot-api
            api-version: "26.2-R0.1-SNAPSHOT"
          - name: Paper 26.1.2
            java: "25"
            api-group: io.papermc.paper
            api-artifact: paper-api
            api-version: "26.1.2.build.74-stable"
          - name: Paper 26.2
            java: "25"
            api-group: io.papermc.paper
            api-artifact: paper-api
            api-version: "26.2.build.56-alpha"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build against ${{ matrix.name }}
        run: >-
          mvn -B clean package
          -Dserver.api.group=${{ matrix.api-group }}
          -Dserver.api.artifact=${{ matrix.api-artifact }}
          -Dserver.api.version=${{ matrix.api-version }}

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: SorekillTeams-${{ matrix.java }}-${{ strategy.job-index }}
          path: target/*.jar
          if-no-files-found: error
